<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的信息 - 学生信息管理系统</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <header class="page-header">
    <h1>🎓 我的信息</h1>
    <div class="header-actions">
      <span class="header-user" id="headerUser"></span>
      <button type="button" class="btn btn-secondary btn-sm" id="logoutBtn">退出登录</button>
    </div>
  </header>

  <main class="page-content">
    <div id="loadingBox" class="loading">
      <div class="spinner"></div>
      <p>加载中...</p>
    </div>

    <div id="profileCard" class="profile-card hidden">
      <div class="profile-header">
        <div class="profile-avatar">👤</div>
        <h2 id="profileName">--</h2>
        <p id="profileUsername"></p>
      </div>
      <div class="profile-body">
        <div class="info-grid" id="infoGrid"></div>
        <div class="alert alert-info" style="margin-top: 1.25rem;">
          如需修改个人信息，请联系管理员。
        </div>
      </div>
    </div>
  </main>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/student.js"></script>
</body>
</html>
