<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理后台 - 学生信息管理系统</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <header class="page-header">
    <h1>🎓 学生信息管理</h1>
    <div class="header-actions">
      <span class="header-user" id="headerUser"></span>
      <button type="button" class="btn btn-secondary btn-sm" id="logoutBtn">退出登录</button>
    </div>
  </header>

  <main class="page-content">
    <div class="toolbar">
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="搜索学号、姓名、班级、专业...">
        <button type="button" class="btn btn-secondary" id="searchBtn">搜索</button>
      </div>
      <button type="button" class="btn btn-primary btn-sm" id="addBtn" style="width: auto;">+ 新增学生</button>
    </div>

    <div id="loadingBox" class="loading">
      <div class="spinner"></div>
      <p>加载中...</p>
    </div>

    <div id="tableWrapper" class="table-wrapper hidden">
      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th>学号</th>
              <th>姓名</th>
              <th>性别</th>
              <th>年龄</th>
              <th>班级</th>
              <th>专业</th>
              <th>用户名</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="studentTableBody"></tbody>
        </table>
      </div>
      <div id="emptyState" class="empty-state hidden">
        <div class="empty-state-icon">📋</div>
        <p>暂无学生信息</p>
      </div>
    </div>
  </main>

  <!-- 新增/编辑弹窗 -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modalTitle">新增学生</h2>
        <button type="button" class="modal-close" id="modalClose">&times;</button>
      </div>
      <form id="studentForm">
        <div class="modal-body">
          <input type="hidden" id="editId">
          <div class="form-row">
            <div class="form-group">
              <label for="formUsername">用户名 *</label>
              <input type="text" id="formUsername" required>
            </div>
            <div class="form-group">
              <label for="formPassword">密码 <span id="pwdHint">*</span></label>
              <input type="password" id="formPassword" placeholder="至少 6 位">
              <p class="form-hint hidden" id="pwdEditHint">留空则不修改密码</p>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="formStudentNo">学号</label>
              <input type="text" id="formStudentNo">
            </div>
            <div class="form-group">
              <label for="formName">姓名</label>
              <input type="text" id="formName">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="formGender">性别</label>
              <select id="formGender">
                <option value="">请选择</option>
                <option value="男">男</option>
                <option value="女">女</option>
              </select>
            </div>
            <div class="form-group">
              <label for="formAge">年龄</label>
              <input type="number" id="formAge" min="1" max="150">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="formClass">班级</label>
              <input type="text" id="formClass">
            </div>
            <div class="form-group">
              <label for="formMajor">专业</label>
              <input type="text" id="formMajor">
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" id="cancelBtn">取消</button>
          <button type="submit" class="btn btn-primary btn-sm" id="saveBtn" style="width: auto;">保存</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/admin.js"></script>
</body>
</html>
